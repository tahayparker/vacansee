name: Update Timetable Data

on:
  schedule:
    # Peak window: every 15 minutes — gated; runs the scraper only when
    # `public/academic_schedule.json` says we're inside a semester's
    # peak period (tutorial-enrolment start - 14 days .. last date to enrol).
    - cron: "*/15 * * * *"
    # Off-peak: once a day at 04:00 UTC (= 08:00 GMT+4). Also refreshes the
    # academic calendar cache on every daily tick.
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  # Minimum required — job pushes CSV/JSON commits back to main and uploads
  # debug artifacts on failure.
  contents: write
  actions: read

jobs:
  update-timetable:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: update-timetable
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Schedule gate (peak vs off-peak)
        id: gate
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SCHEDULE: ${{ github.event.schedule }}
        run: |
          python scripts/check_schedule.py || true

      - name: Exit early if gate says skip
        if: steps.gate.outputs.should_run != 'true'
        run: |
          echo "::notice::Off-peak 15-minute tick — skipping scraper run."
          echo "Current semester: ${{ steps.gate.outputs.current_semester }}"
          echo "Trigger: ${{ steps.gate.outputs.trigger }}"

      - name: Install system dependencies for Camoufox + Patchright
        if: steps.gate.outputs.should_run == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 libasound2t64 libdbus-glib-1-2 libx11-xcb1 libxt6 \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libxkbcommon0 libpango-1.0-0 \
            libcairo2 libgbm1 fonts-liberation

      - name: Fetch Camoufox browser
        if: steps.gate.outputs.should_run == 'true'
        run: python -m camoufox fetch

      - name: Install Patchright Chromium (fallback backend)
        if: steps.gate.outputs.should_run == 'true'
        run: python -m patchright install chromium --with-deps

      - name: Restore session cache
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/cache/restore@v4
        with:
          path: .storage_state.json
          key: uowd-session-${{ github.run_id }}
          restore-keys: |
            uowd-session-

      - name: Set up environment variables
        if: steps.gate.outputs.should_run == 'true'
        env:
          SUPABASE_URL_SECRET: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY_SECRET: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          UOWD_EMAIL_SECRET: ${{ secrets.UOWD_EMAIL }}
          UOWD_PASSWORD_SECRET: ${{ secrets.UOWD_PASSWORD }}
          UOWD_TOTP_SECRET_SECRET: ${{ secrets.UOWD_TOTP_SECRET }}
        run: |
          for v in SUPABASE_URL_SECRET SUPABASE_SERVICE_KEY_SECRET UOWD_EMAIL_SECRET UOWD_PASSWORD_SECRET UOWD_TOTP_SECRET_SECRET; do
            if [ -z "${!v}" ]; then echo "::error::Secret $v not set."; exit 1; fi
          done
          {
            echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
            echo "UOWD_EMAIL=${{ secrets.UOWD_EMAIL }}"
            echo "UOWD_PASSWORD=${{ secrets.UOWD_PASSWORD }}"
            echo "UOWD_TOTP_SECRET=${{ secrets.UOWD_TOTP_SECRET }}"
          } >> "$GITHUB_ENV"

      - name: Refresh academic calendar (daily / manual)
        if: steps.gate.outputs.should_run == 'true' && (steps.gate.outputs.trigger == 'daily' || steps.gate.outputs.trigger == 'manual')
        run: python scripts/update_schedule.py

      - name: Generate new timetable CSV data
        id: scrape
        if: steps.gate.outputs.should_run == 'true'
        run: |
          echo "Running authenticated timetable scraper…"
          python scripts/scrape_timetable_auth.py --output public/classes.csv

      - name: Save session cache
        if: steps.gate.outputs.should_run == 'true' && always() && hashFiles('.storage_state.json') != ''
        uses: actions/cache/save@v4
        with:
          path: .storage_state.json
          key: uowd-session-${{ github.run_id }}

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug-${{ github.run_id }}
          path: scripts/debug/
          retention-days: 7
          if-no-files-found: ignore

      - name: Compare Generated CSV with Repository CSV
        id: check_csv_changes
        if: steps.gate.outputs.should_run == 'true'
        run: |
          if [ ! -f public/classes.csv ]; then
            echo "::warning::Generated public/classes.csv not found."
            echo "csv_changed=false" >> "$GITHUB_OUTPUT"
          else
            git add public/classes.csv public/academic_schedule.json
            if git diff --quiet HEAD -- public/classes.csv public/academic_schedule.json; then
              echo "No data changes"
              echo "csv_changed=false" >> "$GITHUB_OUTPUT"
              git reset public/classes.csv public/academic_schedule.json
            else
              echo "Data changed"
              echo "csv_changed=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Commit and push CSV changes
        if: steps.gate.outputs.should_run == 'true' && steps.check_csv_changes.outputs.csv_changed == 'true'
        run: |
          git config user.name "Taha Parker via GitHub Actions"
          git config user.email "98612931+tahayparker@users.noreply.github.com"
          git commit -m "Update timetable CSV data [skip deploy]"
          git push

      - name: Update Rooms Table in DB
        if: steps.gate.outputs.should_run == 'true'
        run: python scripts/update_rooms.py

      - name: Upload Timetable to DB
        if: steps.gate.outputs.should_run == 'true'
        run: |
          python scripts/upload_timetable.py
          ec=$?
          if [ $ec -ne 0 ] && [ $ec -ne 1 ]; then
            echo "::error::Upload script failed with $ec"
            exit $ec
          fi

      - name: Generate Schedule JSON
        if: steps.gate.outputs.should_run == 'true'
        run: |
          python scripts/generate_schedule.py
          ec=$?
          if [ $ec -ne 0 ] && [ $ec -ne 1 ]; then
            echo "::error::Schedule generation failed with $ec"
            exit $ec
          fi

      - name: Format scheduleData.json with Prettier
        if: steps.gate.outputs.should_run == 'true'
        run: |
          npm install --no-save prettier
          npx prettier public/scheduleData.json --write

      - name: Commit and push JSON changes
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git add public/scheduleData.json
          if ! git diff --staged --quiet; then
            git config user.name "Taha Parker via GitHub Actions"
            git config user.email "98612931+tahayparker@users.noreply.github.com"
            git commit -m "Update timetable JSON data [skip deploy]"
            git push
          else
            echo "No JSON changes"
          fi
